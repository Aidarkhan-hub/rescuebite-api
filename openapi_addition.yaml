# ================================================================
  # RESTAURANTS
  # ================================================================

  /restaurants:
    get:
      tags: [Restaurants]
      summary: List approved restaurants with cursor pagination
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 50
      responses:
        "200":
          description: Paginated list of restaurants
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Restaurant"
                  meta:
                    type: object
                    properties:
                      nextCursor:
                        type: string
                        nullable: true
                      hasMore:
                        type: boolean

    post:
      tags: [Restaurants]
      summary: Create a restaurant (DONOR only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, address, locationLat, locationLng, closingTime]
              properties:
                name:
                  type: string
                  example: "Dastarkhan Restaurant"
                address:
                  type: string
                  example: "ul. Abaya 10, Almaty"
                locationLat:
                  type: number
                  example: 43.2389
                locationLng:
                  type: number
                  example: 76.9457
                closingTime:
                  type: string
                  example: "22:00"
      responses:
        "201":
          description: Restaurant created (pending admin approval)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Restaurant"
        "403":
          description: DONOR role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /restaurants/{id}:
    get:
      tags: [Restaurants]
      summary: Get restaurant by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Restaurant details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Restaurant"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /restaurants/{id}/rate:
    post:
      tags: [Restaurants]
      summary: Rate a restaurant (RECIPIENT only, once per restaurant)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [score]
              properties:
                score:
                  type: integer
                  minimum: 1
                  maximum: 5
                  example: 4
      responses:
        "201":
          description: Rating saved, restaurant average updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      score:
                        type: integer
                        example: 4
        "403":
          description: RECIPIENT role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /restaurants/{id}/approve:
    patch:
      tags: [Restaurants]
      summary: Approve a restaurant (ADMIN only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Restaurant approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Restaurant"
        "403":
          description: ADMIN role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /restaurants/{id}/block:
    patch:
      tags: [Restaurants]
      summary: Block a restaurant (ADMIN only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Restaurant blocked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Restaurant"
        "403":
          description: ADMIN role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ================================================================
  # DRIVER
  # ================================================================

  /driver/orders:
    get:
      tags: [Driver]
      summary: List available orders for pickup (DRIVER only)
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: List of available orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
                  meta:
                    type: object
                    properties:
                      nextCursor:
                        type: string
                        nullable: true
                      hasMore:
                        type: boolean
        "403":
          description: DRIVER role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /driver/orders/{id}/accept:
    patch:
      tags: [Driver]
      summary: Accept an order (DRIVER only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Order accepted, status set to IN_PROGRESS
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Order"
        "409":
          description: Order already taken or not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /driver/orders/{id}/location:
    post:
      tags: [Driver]
      summary: Update driver GPS location — auto-completes if within 100m of destination
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lat, lng]
              properties:
                lat:
                  type: number
                  example: 43.2389
                lng:
                  type: number
                  example: 76.9457
      responses:
        "200":
          description: Location updated. If arrived=true, order is COMPLETED.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      order:
                        $ref: "#/components/schemas/Order"
                      arrived:
                        type: boolean
                        example: false
                      distanceMeters:
                        type: number
                        example: 342.5

  /driver/history:
    get:
      tags: [Driver]
      summary: Get driver delivery history (DRIVER only)
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Completed and cancelled orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"

  # ================================================================
  # AUCTIONS
  # ================================================================

  /auctions:
    get:
      tags: [Auctions]
      summary: List active flash auctions (DRIVER only)
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Active auctions with current lowest bid
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Auction"
        "403":
          description: DRIVER role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auctions/{id}/bid:
    post:
      tags: [Auctions]
      summary: Place a bid on an auction (DRIVER only) — lowest bid wins
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bidAmount]
              properties:
                bidAmount:
                  type: integer
                  description: Delivery fee offer in cents
                  example: 50000
      responses:
        "201":
          description: Bid placed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      auctionId:
                        type: string
                        format: uuid
                      bidAmount:
                        type: integer
                        example: 50000
        "400":
          description: Auction expired or not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: DRIVER role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auctions/{id}/close:
    patch:
      tags: [Auctions]
      summary: Close an auction manually (ADMIN only) — winner is lowest bid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Auction closed, winner determined
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      winner:
                        type: object
                        nullable: true
                        properties:
                          driverId:
                            type: string
                            format: uuid
                          bidAmount:
                            type: integer
                            example: 50000
                      status:
                        type: string
                        enum: [COMPLETED, CANCELLED]
        "403":
          description: ADMIN role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"