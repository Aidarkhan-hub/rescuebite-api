version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: rescuebite_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rescuebite_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rescuebite_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rescuebite_redis
    restart: always
    ports:
      - "6379:6379"